<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ML InfoTech - Manutenção de Computadores e Notebooks, Criação de Sites, Criação de Aplicativos e Consultoria em TI. Aceleramos seu negócio com tecnologia de ponta.">
  <title>ML InfoTech | Inovação e Tecnologia de Ponta</title>
  
  <!-- Fontes do Google -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

      }
    }
  </script>

<body>
  <!-- Container principal do React -->
  <div id="root"></div>
